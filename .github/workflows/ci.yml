name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build
        run: swift build
      - name: Policy checks
        run: swift run delegate-checks

  browser-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/browser-extension
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/browser-extension/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  agent-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Runner tests
        run: python3 tools/agent-runner/test_delegate_run.py
