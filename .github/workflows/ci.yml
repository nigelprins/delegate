name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build
        run: swift build
      - name: Policy checks
        run: swift run delegate-checks

  browser-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/browser-extension
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/browser-extension/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  agent-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Runner tests
        run: python3 tools/agent-runner/test_delegate_run.py
